version: "3.9"

services:
  safe-harbor-backend:
    build:
      context: ./safe-harbor
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./safe-harbor/templates:/app/templates
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  shield-wall-backend:
    build:
      context: ./shield-wall
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./shield-wall/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  launcher:
    build:
      context: ./launcher
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - safe-harbor-backend
      - shield-wall-backend

  safe-harbor-frontend:
    build:
      context: ./safe-harbor/frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5174"
    depends_on:
      - safe-harbor-backend

  shield-wall-frontend:
    build:
      context: ./shield-wall/frontend
      dockerfile: Dockerfile
    ports:
      - "5175:5175"
    depends_on:
      - shield-wall-backend
